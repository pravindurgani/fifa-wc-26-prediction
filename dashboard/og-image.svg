<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="World Cup 2026 Simulator — share card">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- soft accent stripe -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>
  <!-- football mark (proper hexagon stitching, not a peace sign) -->
  <g transform="translate(140,210)" fill="none" stroke="#e5e7eb" stroke-width="6" stroke-linejoin="round">
    <circle cx="105" cy="105" r="100"/>
    <polygon points="105,55 153,82 153,128 105,155 57,128 57,82"/>
    <line x1="105" y1="55" x2="105" y2="5"/>
    <line x1="153" y1="82" x2="195" y2="65"/>
    <line x1="153" y1="128" x2="195" y2="145"/>
    <line x1="105" y1="155" x2="105" y2="205"/>
    <line x1="57" y1="128" x2="15" y2="145"/>
    <line x1="57" y1="82" x2="15" y2="65"/>
  </g>
  <!-- title -->
  <g font-family="Inter, -apple-system, system-ui, Helvetica, sans-serif" fill="#f8fafc">
    <text x="400" y="240" font-size="68" font-weight="800">World Cup 2026</text>
    <text x="400" y="310" font-size="44" font-weight="600" fill="#cbd5e1">Probabilistic simulator</text>
    <text x="400" y="395" font-size="26" fill="#94a3b8">48 teams · 104 matches · 25,000 Monte Carlo simulations</text>
    <text x="400" y="435" font-size="26" fill="#94a3b8">Live-mode results · matchday intelligence layer · calibrated</text>
  </g>
  <!-- footer pill -->
  <rect x="400" y="490" rx="22" ry="22" width="270" height="44" fill="url(#accent)" opacity="0.18"/>
  <text x="535" y="520" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="20" font-weight="600" fill="#e5e7eb">FIFA Annex C bracket</text>
</svg>
